title: 1Password Access Granted to Critical Security Vault
id: 51d0ba6e-e3ca-4ac2-9afb-95c7ba5b982a
status: experimental
description: |
    Detects a grant action targeting vault names associated with critical
    information security infrastructure such as InfraSec, SOC Administration,
    DevSecOps, and Product Security vaults. Any new grant to these vaults
    should be treated as a high-priority event requiring immediate validation
    with the vault owner, as compromise of these vaults grants access to the
    organisation's most sensitive secrets and administrative credentials.
    Note: vault name enrichment via a vault UUID lookup table is required in
    the SIEM pipeline for this rule to be effective.
references:
    - https://support.1password.com/1password-events-reporting/
    - https://developer.1password.com/docs/events-api/reference/
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.initial-access
    - attack.persistence
    - attack.privilege-escalation
    - attack.stealth
    - attack.t1078
    - attack.t1098
logsource:
    product: 1password
    service: 1password
detection:
    selection:
        action: 'grant'
    condition: selection
falsepositives:
    - Legitimate access provisioning by the vault owner or security team lead
    - New team member onboarding to the security function
level: high
