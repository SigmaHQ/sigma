title: 1Password Vault Secret Export
id: 643c2d56-be35-40ac-89b1-176be1da8b01
status: experimental
description: |
    Detects the export action in 1Password audit events, which exports vault items
    to plaintext format. This action exposes credentials in unencrypted form and
    is a high-confidence indicator of credential exfiltration. Legitimate bulk
    exports are extremely rare in production environments and require explicit
    admin confirmation.
references:
    - https://support.1password.com/1password-events-reporting/
    - https://developer.1password.com/docs/events-api/reference/
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.collection
    - attack.t1530
    - attack.credential-access
    - attack.t1555
logsource:
    product: 1password
    service: 1password
detection:
    selection:
        action: 'export'
    condition: selection
falsepositives:
    - Authorized bulk export performed by an administrator for vault migration
    - Security team exporting credentials during approved offboarding workflow
level: critical
