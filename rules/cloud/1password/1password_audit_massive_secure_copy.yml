title: 1Password Anomalous Bulk Secure-Copy Activity
id: 36ca88ab-edb0-4397-9a5b-46465416b27c
status: experimental
description: |
    Detects a single user performing secure-copy on more than 15 unique vault items
    within a short time window. The secure-copy action copies a credential item in
    encrypted form, but bulk copying of many unique items in a short window is a
    strong indicator of credential harvesting prior to exfiltration or job change.
    Normal usage rarely involves copying more than a handful of items at a time.
references:
    - https://support.1password.com/1password-events-reporting/
    - https://developer.1password.com/docs/events-api/reference/
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.collection
    - attack.t1530
logsource:
    product: 1password
    service: 1password
detection:
    selection:
        action: 'secure-copy'
    condition: selection | count(item_uuid) by user.email > 15
falsepositives:
    - Administrator performing bulk vault migration or reorganisation
    - Automated integration using service account credentials
level: high
