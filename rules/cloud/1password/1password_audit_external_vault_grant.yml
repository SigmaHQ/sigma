title: 1Password Vault Access Granted or Invited to External Email
id: 312c7d1b-8794-46e5-a420-3724a2f59dfb
status: experimental
description: |
    Detects vault access being granted or an invite being extended to an email
    address outside the organisation domain. An attacker with access to a
    privileged account may grant vault access to an external email they control,
    effectively establishing a persistent backdoor into the credential store
    that survives password resets of the original account.
references:
    - https://support.1password.com/1password-events-reporting/
    - https://developer.1password.com/docs/events-api/reference/
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.persistence
    - attack.t1098
    - attack.defense-evasion
    - attack.t1078
logsource:
    product: 1password
    service: 1password
detection:
    selection_grant:
        action: 'grant'
    selection_invite:
        action: 'create'
        object_type: 'invite'
    condition: 1 of selection_*
falsepositives:
    - Legitimate access granted to an external vendor, contractor, or auditor
    - Approved sharing with a partner organisation for a joint project
level: high
