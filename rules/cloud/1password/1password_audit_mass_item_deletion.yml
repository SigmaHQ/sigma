title: 1Password Mass Item Deletion
id: dcfea874-7717-4b09-8f99-facf4a823d02
status: experimental
description: |
    Detects a single user deleting 10 or more unique vault items within one hour.
    In the 1Password Events API the deletion of an item is recorded as a
    server-update action. Mass deletion is a strong indicator of a destructive
    insider threat action or an attacker destroying credentials to impair
    incident response and recovery.
references:
    - https://support.1password.com/1password-events-reporting/
    - https://developer.1password.com/docs/events-api/reference/
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.impact
    - attack.t1485
    - attack.collection
    - attack.t1530
logsource:
    product: 1password
    service: 1password
detection:
    selection:
        action: 'server-update'
    condition: selection | count(item_uuid) by user.email > 10
falsepositives:
    - Administrator performing authorised bulk cleanup or vault restructuring
    - Automated provisioning system removing stale credentials in batch
level: high
