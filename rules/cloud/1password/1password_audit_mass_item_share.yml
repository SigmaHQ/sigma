title: 1Password Anomalous Bulk Item Sharing
id: b02a4aca-5ffa-4c8f-9c2b-81a55fb4ae5b
status: experimental
description: |
    Detects a single user sharing more than 10 unique vault items within a
    24-hour period. Sharing a credential item creates a link or access grant
    that gives recipients visibility into the secret. Bulk sharing of many
    unique items by one user deviates significantly from normal usage patterns
    and may indicate an insider threat preparing to leave the organisation
    or an attacker redistributing access to credentials they have compromised.
references:
    - https://support.1password.com/1password-events-reporting/
    - https://developer.1password.com/docs/events-api/reference/
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.collection
    - attack.t1530
logsource:
    product: 1password
    service: 1password
detection:
    selection:
        action: 'share'
    condition: selection | count(item_uuid) by user.email > 10
falsepositives:
    - Team lead distributing access to a large shared project vault
    - Administrator bulk-sharing items during an approved team onboarding
level: high
