title: 1Password Authentication Failure Spike
id: b79ec672-b8b0-4cd6-a221-ab07f103ab4f
status: experimental
description: |
    Detects more than 50 failed authentication events for a single account
    within one hour in the 1Password audit log. A high volume of failures
    against one account indicates an online brute-force or credential-stuffing
    attack targeting the password manager directly. Firewall-level failures
    (firewall_failed category) are excluded to reduce noise from automated
    scanners that never reach application-layer authentication.
references:
    - https://support.1password.com/1password-events-reporting/
    - https://developer.1password.com/docs/events-api/reference/
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.credential-access
    - attack.t1110
logsource:
    product: 1password
    service: 1password
detection:
    selection:
        category|contains: 'failed'
    filter_firewall:
        category: 'firewall_failed'
    condition: selection and not filter_firewall
falsepositives:
    - Automated integration or monitoring tool using an incorrect stored password
    - User repeatedly mistyping their master password across multiple devices
level: medium
