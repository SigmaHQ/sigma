title: Google Workspace Password Policy Changed
id: 218edcc9-4b7a-4e62-c8f3-1d5a9b2e7c40
status: experimental
description: |
    Detects changes to the Google Workspace password policy via the
    CHANGE_APPLICATION_SETTING admin audit event where the setting name
    relates to password configuration. Weakening password requirements
    such as reducing minimum length, disabling complexity requirements,
    or extending expiry periods reduces the barrier for credential-based
    attacks and persistence.
references:
    - https://developers.google.com/admin-sdk/reports/v1/appendix/activity/admin-security-settings
    - https://support.google.com/a/answer/139399
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.defense-impairment
    - attack.t1685
logsource:
    product: gcp
    service: google_workspace.admin
detection:
    selection:
        eventService: admin.googleapis.com
        eventName: CHANGE_APPLICATION_SETTING
        setting_name|contains: 'Password'
    condition: selection
falsepositives:
    - Legitimate password policy update by security team as part of policy review
    - Compliance-driven password policy adjustment approved via change management
level: medium
