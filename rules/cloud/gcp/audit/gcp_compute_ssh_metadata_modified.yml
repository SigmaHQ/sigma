title: Google Cloud Compute SSH Metadata Modified
id: f8e90445-3b47-4d07-b49c-1b1616214d1d
status: experimental
description: |
    Detects modifications to SSH keys stored in GCP project or instance metadata.
    SSH metadata keys grant OS-level access to all instances (project-level) or
    specific instances. Attackers who gain temporary GCP console access add SSH
    keys to metadata to establish persistent shell access to compute instances
    that survives credential rotation or account suspension.
references:
    - https://cloud.google.com/compute/docs/connect/add-ssh-keys
    - https://cloud.google.com/logging/docs/audit/understanding-audit-logs
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1098.004
logsource:
    product: gcp
    service: gcp.audit
detection:
    selection:
        gcp.audit.method_name:
            - 'v1.compute.projects.setCommonInstanceMetadata'
            - 'v1.compute.instances.setMetadata'
    condition: selection
falsepositives:
    - Developer or administrator adding a new SSH key for legitimate access
    - Automated key rotation scripts updating project-level SSH keys
level: medium
