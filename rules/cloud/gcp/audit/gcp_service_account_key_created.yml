title: Google Cloud Service Account Key Created
id: 5a454dc4-a1bb-4e1d-a735-7e65d5110c4a
status: experimental
description: |
    Detects creation of new service account keys in Google Cloud. Service account
    keys are long-lived credentials that provide programmatic access equivalent
    to the service account's permissions and do not expire by default. Attackers
    who gain temporary access to a GCP project create service account keys on
    privileged accounts to establish persistent backdoor access that survives
    account deprovisioning or password changes.
references:
    - https://cloud.google.com/iam/docs/keys-create-delete
    - https://cloud.google.com/logging/docs/audit/understanding-audit-logs
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1098.001
logsource:
    product: gcp
    service: gcp.audit
detection:
    selection:
        gcp.audit.method_name|endswith: '.serviceAccounts.keys.create'
    condition: selection
falsepositives:
    - CI/CD pipeline creating a service account key for automated deployment
    - Developer bootstrapping credentials for local development or testing
level: high
