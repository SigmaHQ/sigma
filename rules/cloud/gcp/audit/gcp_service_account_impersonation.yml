title: Google Cloud Service Account Impersonation Detected
id: b4deaff2-d032-4dab-8d05-d35fd0aa7fce
status: experimental
description: |
    Detects service account impersonation via the IAM Credentials API. Impersonation
    allows a principal to obtain short-lived credentials for another service account
    using GenerateAccessToken, SignBlob, or SignJwt. Attackers use impersonation to
    escalate privileges by accessing a higher-privileged service account without
    creating persistent keys, making the activity harder to detect through
    standard credential inventory checks.
references:
    - https://cloud.google.com/iam/docs/impersonating-service-accounts
    - https://cloud.google.com/logging/docs/audit/understanding-audit-logs
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.lateral-movement
    - attack.t1550.001
logsource:
    product: gcp
    service: gcp.audit
detection:
    selection:
        gcp.audit.method_name:
            - 'google.iam.credentials.v1.IAMCredentials.GenerateAccessToken'
            - 'google.iam.credentials.v1.IAMCredentials.SignBlob'
            - 'google.iam.credentials.v1.IAMCredentials.SignJwt'
    condition: selection
falsepositives:
    - Legitimate workload using impersonation as part of a least-privilege architecture
    - Automated deployment pipelines using impersonation chains for multi-project access
level: medium
