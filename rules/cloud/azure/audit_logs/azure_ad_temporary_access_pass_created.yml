title: Temporary Access Pass Created for Entra ID User Account
id: 29025461-dce8-4715-aa68-b0c6915b4988
status: experimental
description: |
    Detects creation of a Temporary Access Pass (TAP) for an Entra ID user account.
    A TAP is a time-limited, PIN-based credential that allows passwordless sign-in
    and bypasses existing MFA, including phishing-resistant methods. An attacker
    with User or Authentication Administrator privileges can issue a TAP for a
    target account and register persistent authentication methods before the TAP
    expires.
references:
    - https://learn.microsoft.com/en-us/entra/identity/authentication/howto-authentication-temporary-access-pass
author: descambiado
date: 2026-05-19
tags:
    - attack.persistence
    - attack.credential-access
    - attack.defense-impairment
    - attack.privilege-escalation
    - attack.t1556.006
    - attack.t1098
logsource:
    product: azure
    service: auditlogs
detection:
    selection:
        OperationName|contains:
            - 'Temporary Access Pass'
    condition: selection
falsepositives:
    - Help desk teams issuing TAPs for locked-out users
    - Onboarding workflows provisioning TAPs during device enrollment
level: high
