title: Temporary Access Pass Created for Entra ID User Account
id: 29025461-dce8-4715-aa68-b0c6915b4988
status: test
description: |
    Detects creation of a Temporary Access Pass (TAP) for an Entra ID user account.
    A TAP is a time-limited, PIN-based credential that allows passwordless
    authentication and bypasses existing MFA requirements, including phishing-resistant
    methods. An attacker with User Administrator or Authentication Administrator
    privileges can issue a TAP for a target account, sign in without knowing the
    current password, and register new persistent authentication methods before the
    TAP expires. TAP creation in a steady-state environment is infrequent and should
    be correlated against help desk records or onboarding workflows.
references:
    - https://learn.microsoft.com/en-us/entra/identity/authentication/howto-authentication-temporary-access-pass
    - https://attack.mitre.org/techniques/T1556/006/
    - https://attack.mitre.org/techniques/T1098/
author: descambiado
date: 2026-05-19
tags:
    - attack.persistence
    - attack.credential-access
    - attack.t1556.006
    - attack.t1098
logsource:
    product: azure
    service: auditlogs
detection:
    selection:
        OperationName|contains:
            - 'Temporary Access Pass'
    condition: selection
falsepositives:
    - Help desk teams issuing TAPs for locked-out users or new employee onboarding
    - Automated identity lifecycle workflows that provision TAPs during device enrollment
level: high
