title: AWS Write Action Executed in Organizations Management Account
id: 37e1e3d8-3bd8-4f8e-904c-42ac8138c884
status: experimental
description: |
    Detects non-read-only AWS API calls in the AWS Organizations management
    account by a human user or non-pipeline identity, without a Terraform or
    IaC commit reference in the user-agent string. The management account
    should be operated exclusively via IaC pipelines. Direct write operations
    indicate a policy violation or a compromised identity bypassing GitOps controls.
references:
    - https://docs.aws.amazon.com/organizations/latest/userguide/orgs_best-practices.html
author: Ivan Saakov
date: 2026-05-09
tags:
    - attack.defense-evasion
    - attack.initial-access
    - attack.persistence
    - attack.privilege-escalation
    - attack.stealth
    - attack.t1078.004
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventName|startswith:
            - Create
            - Delete
            - Update
            - Put
            - Modify
            - Attach
            - Detach
            - Enable
            - Disable
            - Start
            - Stop
    filter_gitops:
        userAgent|contains: terraform
    filter_service:
        userIdentity.type: Service
    condition: selection and not 1 of filter_*
falsepositives:
    - Break-glass emergency access by authorized administrators
    - Initial account bootstrapping before IaC is established
    - AWS Console operations approved via change management process
level: high
