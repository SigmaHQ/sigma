title: AWS SSO Interactive Authentication via Non-Personal Account
id: 398fed3d-d69f-4dd8-aabd-c929fe9e5f9a
status: experimental
description: |
    Detects AWS IAM Identity Center (SSO) authentication or SAML federation
    events originating from identities that are not personal user accounts
    (i.e. do not contain an email address). Service accounts authenticating
    interactively through SSO may indicate credential theft or misuse of
    non-human identity credentials for lateral movement.
references:
    - https://docs.aws.amazon.com/singlesignon/latest/userguide/what-is.html
    - https://attack.mitre.org/techniques/T1078/004/
    - https://attack.mitre.org/techniques/T1550/
author: Ivan Saakov
date: 2026-05-09
tags:
    - attack.lateral-movement
    - attack.initial-access
    - attack.t1078.004
    - attack.t1550
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventName:
            - Authenticate
            - Federate
            - AssumeRoleWithSAML
    filter_personal:
        userIdentity.userName|contains: '@'
    condition: selection and not filter_personal
falsepositives:
    - Automated CI/CD pipeline authentication using SAML federation
    - Approved service-to-service federation patterns
    - Machine identities with pre-configured SSO roles
level: medium