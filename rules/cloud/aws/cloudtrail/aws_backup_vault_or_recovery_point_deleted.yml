title: AWS Backup Vault or Recovery Point Deleted
id: 203aacb4-c7c8-483e-9a03-cc429bfab5b7
status: experimental
description: |
    Detects destructive operations against AWS Backup such as deletion of backup
    vaults, recovery points, backup plans, or backup selections. These actions
    are commonly performed by ransomware actors to eliminate recovery options
    before encrypting or deleting primary data.
references:
    - https://www.invictus-ir.com/news/ransomware-in-aws
    - https://docs.aws.amazon.com/aws-backup/latest/devguide/API_DeleteBackupVault.html
author: Ivan Saakov
date: 2026-05-09
tags:
    - attack.impact
    - attack.t1490
    - attack.t1485
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: backup.amazonaws.com
        eventName:
            - DeleteBackupVault
            - DeleteRecoveryPoint
            - DeleteBackupPlan
            - DeleteBackupSelection
            - StopBackupJob
            - PutBackupVaultLockConfiguration
    condition: selection
falsepositives:
    - Legitimate backup lifecycle management deleting expired recovery points
    - Infrastructure teardown in non-production accounts
    - Backup plan restructuring via Terraform
level: high
