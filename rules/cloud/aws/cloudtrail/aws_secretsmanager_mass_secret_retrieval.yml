title: AWS Secrets Manager Mass Secret Retrieval
id: 45251c1d-3fda-47d4-a990-b7ce4d635fc0
status: experimental
description: |
    Detects bulk retrieval of secrets from AWS Secrets Manager by a single
    identity within a short timeframe. Attackers with compromised credentials
    enumerate and dump all accessible secrets to harvest database passwords,
    API keys, and other credentials. Distinct from single secret access which
    may be routine application behavior.
references:
    - https://rhinosecuritylabs.com/aws/pacu-open-source-aws-exploitation-framework/
    - https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_GetSecretValue.html
    - https://attack.mitre.org/techniques/T1552/001/
    - https://attack.mitre.org/techniques/T1555/
author: Ivan Saakov
date: 2026-05-09
tags:
    - attack.credential-access
    - attack.t1552.001
    - attack.t1555
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: secretsmanager.amazonaws.com
        eventName:
            - GetSecretValue
            - BatchGetSecretValue
    condition: selection | count() by userIdentity.arn > 20
falsepositives:
    - Application deployment scripts reading multiple secrets during initialization
    - Secrets rotation automation accessing all managed secrets
    - Legitimate bulk migration or backup tooling
level: high