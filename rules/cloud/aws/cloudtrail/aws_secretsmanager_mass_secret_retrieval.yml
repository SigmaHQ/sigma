title: AWS Secrets Manager Mass Secret Retrieval
id: 45251c1d-3fda-47d4-a990-b7ce4d635fc0
status: experimental
description: |
    Detects bulk retrieval of secrets from AWS Secrets Manager. Attackers with
    compromised credentials enumerate and dump all accessible secrets to harvest
    database passwords, API keys, and other credentials. For threshold-based
    detection of mass retrieval consider creating a Sigma correlation rule on
    top of this base rule filtering by count per identity.
references:
    - https://rhinosecuritylabs.com/aws/pacu-open-source-aws-exploitation-framework/
    - https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_GetSecretValue.html
author: Ivan Saakov
date: 2026-05-09
tags:
    - attack.credential-access
    - attack.t1552.001
    - attack.t1555
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: secretsmanager.amazonaws.com
        eventName:
            - GetSecretValue
            - BatchGetSecretValue
    condition: selection
falsepositives:
    - Application deployment scripts reading multiple secrets during initialization
    - Secrets rotation automation accessing all managed secrets
    - Legitimate bulk migration or backup tooling
level: medium
