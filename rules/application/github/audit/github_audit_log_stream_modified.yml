title: GitHub Audit Log Streaming Configuration Modified
id: ac347d2f-6e07-42bc-8c06-7ad456690c2a
status: experimental
description: |
    Detects creation, deletion, or modification of GitHub audit log streaming
    configuration. Audit log streaming forwards all GitHub audit events to an
    external SIEM or storage bucket. Disabling or redirecting the stream is a
    defensive evasion technique that blinds security monitoring of all subsequent
    GitHub activity within the enterprise.
references:
    - https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/streaming-the-audit-log-for-your-enterprise
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.defense-impairment
    - attack.t1685
logsource:
    product: github
    service: audit
    definition: 'Requirements: The audit log streaming feature must be enabled to be able to receive such logs. You can enable following the documentation here: https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/streaming-the-audit-log-for-your-enterprise#setting-up-audit-log-streaming'
detection:
    selection:
        action|startswith: 'audit_log_streaming'
    condition: selection
falsepositives:
    - Planned migration of audit log destination by infrastructure or security team
    - Initial setup of audit log streaming
level: high
