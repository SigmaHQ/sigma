title: GitHub OAuth Application Authorization Created
id: 4a4bba20-c180-4eec-9600-0e95cc3b3fc4
status: experimental
description: |
    Detects creation of a new OAuth application authorization on a GitHub account.
    OAuth authorizations grant third-party applications persistent access to the
    user's GitHub resources with delegated permissions. Attackers phish users into
    authorizing malicious OAuth apps to obtain long-lived access tokens that
    bypass MFA and survive password changes, a technique known as OAuth token
    hijacking or consent phishing.
references:
    - https://docs.github.com/en/apps/oauth-apps/using-oauth-apps/authorizing-oauth-apps
    - https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.persistence
    - attack.initial-access
    - attack.privilege-escalation
    - attack.lateral-movement
    - attack.stealth
    - attack.t1078.004
    - attack.t1550.001
logsource:
    product: github
    service: audit
    definition: 'Requirements: The audit log streaming feature must be enabled to be able to receive such logs. You can enable following the documentation here: https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/streaming-the-audit-log-for-your-enterprise#setting-up-audit-log-streaming'
detection:
    selection:
        action: 'oauth_authorization.create'
    condition: selection
falsepositives:
    - Developer authorizing a legitimate third-party integration or IDE extension
    - First-time authorization of approved internal tooling using OAuth
level: medium
