title: GitHub Repository Ruleset Deleted
id: 73283d6b-b081-4eee-8c58-5d0f9507fe7a
status: experimental
description: |
    Detects deletion of a GitHub repository ruleset. Repository rulesets enforce
    branch protection policies such as required reviews, status checks, and push
    restrictions across multiple repositories. Deleting a ruleset removes these
    controls organization-wide and may precede unauthorized force pushes,
    direct commits to protected branches, or supply chain tampering.
references:
    - https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-rulesets/about-rulesets
    - https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.defense-impairment
    - attack.t1685
logsource:
    product: github
    service: audit
    definition: 'Requirements: The audit log streaming feature must be enabled to be able to receive such logs. You can enable following the documentation here: https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/streaming-the-audit-log-for-your-enterprise#setting-up-audit-log-streaming'
detection:
    selection:
        action: 'repository_ruleset.destroy'
    condition: selection
falsepositives:
    - Planned removal of deprecated rulesets during repository governance restructuring
    - Migration from rulesets to branch protection rules via IaC
level: high
