title: GitHub User SSH Key Created or Deleted
id: cba4c69e-64b1-4aad-b4af-7454e220644c
status: experimental
description: |
    Detects creation or deletion of SSH keys on a GitHub user account. SSH keys
    provide authentication equivalent to password access for git operations.
    Attackers who gain temporary access to a GitHub account add a new SSH key
    to establish persistent repository access that bypasses subsequent MFA
    enforcement or password changes on the account.
references:
    - https://docs.github.com/en/authentication/connecting-to-github-with-ssh/adding-a-new-ssh-key-to-your-github-account
    - https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/audit-log-events-for-your-enterprise
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.initial-access
    - attack.stealth
    - attack.t1078.004
    - attack.t1098.004
logsource:
    product: github
    service: audit
    definition: 'Requirements: The audit log streaming feature must be enabled to be able to receive such logs. You can enable following the documentation here: https://docs.github.com/en/enterprise-cloud@latest/admin/monitoring-activity-in-your-enterprise/reviewing-audit-logs-for-your-enterprise/streaming-the-audit-log-for-your-enterprise#setting-up-audit-log-streaming'
detection:
    selection:
        action:
            - 'ssh_key.create'
            - 'ssh_key.delete'
    condition: selection
falsepositives:
    - Developer rotating SSH keys as part of regular key hygiene
    - New employee onboarding adding their first SSH key to GitHub
level: medium
