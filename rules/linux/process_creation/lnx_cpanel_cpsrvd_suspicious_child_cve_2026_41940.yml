logsource:
    product: linux
    category: process_creation
detection:
    selection_parent:
        ParentImage|contains:
            - '/cpsrvd'
            - '/cpsrvd-ssl'
            - '/cpdavd'
            - '/cpdavd-ssl'
    selection_shell:
        Image|endswith:
            - '/bash'
            - '/sh'
            - '/dash'
            - '/zsh'
            - '/ksh'
            - '/tcsh'
    selection_recon:
        Image|endswith:
            - '/whoami'
            - '/id'
            - '/uname'
            - '/hostname'
            - '/ifconfig'
            - '/ip'
            - '/netstat'
            - '/ss'
            - '/ps'
            - '/ls'
    selection_download:
        Image|endswith:
            - '/curl'
            - '/wget'
            - '/fetch'
            - '/tftp'
            - '/ftp'
    selection_interpreter:
        Image|endswith:
            - '/python'
            - '/python2'
            - '/python3'
            - '/perl'
            - '/ruby'
            - '/php'
            - '/node'
    selection_restart_abuse:
        Image|endswith:
            - '/restartsrv_cpsrvd'
            - '/restartsrv_cpdavd'
    filter_legitimate_children:
        Image|endswith:
            - '/cpsrvd'
            - '/cpsrvd-ssl'
            - '/cpdavd'
            - '/cpdavd-ssl'
            - '/cpanellogd'
            - '/tailwatchd'
            - '/queueprocd'
            - '/comet'
            - '/cpsanitycheck'
    condition: selection_parent and (selection_shell or selection_recon or selection_download or selection_interpreter or selection_restart_abuse) and not filter_legitimate_children
falsepositives:
    - cPanel plugins or custom hooks that legitimately invoke shell scripts as cpsrvd children
    - Administrative cPanel update processes that temporarily spawn interpreters
    - Monitoring agents operating under the cPanel process context
    - Some cPanel backup processes may spawn curl/wget for off-server transfers
level: critical
