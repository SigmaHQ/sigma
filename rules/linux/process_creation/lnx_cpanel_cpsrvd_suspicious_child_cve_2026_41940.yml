      type: derived
status: test
description: |
    Detects post-exploitation command execution from CVE-2026-41940, a critical
    authentication bypass in cPanel and WHM (CVSS 9.8). After bypassing authentication
    via CRLF injection into cpsrvd session files, attackers execute arbitrary commands
    through the cpsrvd or cpdavd daemon running as root.
    cpsrvd (cPanel service daemon) and cpdavd (WebDAV daemon) have well-defined child
    process trees during normal operation. Spawning interactive shells, reconnaissance
    tools, download utilities, or scripting interpreters as direct children of these
    daemons is strongly anomalous and indicates successful exploitation.
references:
    - https://support.cpanel.net/hc/en-us/articles/40073787579671
    - https://labs.watchtowr.com/the-internet-is-falling-down-falling-down-falling-down-cpanel-whm-authentication-bypass-cve-2026-41940/
    - https://www.rapid7.com/blog/post/etr-cve-2026-41940-cpanel-whm-authentication-bypass/
    - https://nvd.nist.gov/vuln/detail/CVE-2026-41940
