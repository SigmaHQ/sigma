title: Suspicious SUID Bit Set on Shell Binary via Install Command
id: f7d2e4b9-3c18-4a67-9e05-1b6f8d3a7c52
related:
    - id: e8c3b5f2-4d71-4a92-f853-7e4d9a2c6b18
      type: similar
status: experimental
description: |
    Detects the use of the GNU 'install' utility to create a SUID-enabled copy of a shell binary
    (bash, sh, dash, zsh, ksh, fish, etc.). Once a root-owned SUID shell is placed in a writable
    location, an attacker executes it with '-p' to obtain a shell with the effective UID of root.
    This technique works with any shell that honours the SUID bit and is used across multiple CVEs
    and CTF/pentest scenarios. There is no legitimate operational reason to stamp a SUID bit onto
    a shell binary via the install command.
references:
    - https://gtfobins.github.io/gtfobins/bash/#suid
    - https://gtfobins.github.io/gtfobins/install/
    - https://github.com/Vozec/CVE-2026-41651
author: Swachchhanda Shrawan Poudel (Nextron Systems)
date: 2026-04-24
tags:
    - attack.privilege-escalation
    - attack.defense-evasion
    - attack.t1548.001
logsource:
    category: process_creation
    product: linux
detection:
    selection_install_img:
        Image|endswith: '/install'
        CommandLine|contains: '-m'
    selection_install_cli:
        CommandLine|contains:
            - 'bash'
            - ' sh'
            - '/sh'
            - 'dash'
            - 'zsh'
            - 'ksh'
            - 'mksh'
            - 'csh'
            - 'tcsh'
            - 'fish'
    selection_mode_numeric:
        # SUID (4), SUID+Sticky (5), SUID+SGID (6), SUID+SGID+Sticky (7) — with optional leading zero
        CommandLine|re: '-m\s+0?[4-7]\d{3}'
    selection_mode_symbolic:
        CommandLine|contains: '+s'
    condition: all of selection_install_* and 1 of selection_mode_*
falsepositives:
    - None expected — there is no legitimate reason to create a SUID copy of a shell binary
level: high