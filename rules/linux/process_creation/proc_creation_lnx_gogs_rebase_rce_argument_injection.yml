---
title: Gogs Rebase Argument Injection RCE via Git Exec Flag
id: c1c6a4a7-9795-5282-80c7-11da044740ae
status: experimental
description: |
    Detects the Gogs authenticated argument-injection RCE (CWE-88, CVSSv4 9.4, unpatched as of
    disclosure) in which a pull request with a malicious base-branch name injects an --exec flag
    into the git rebase that Gogs runs during "Rebase before merging". Because the base branch
    name is passed to git rebase without a -- separator, a branch named like --exec=<cmd> is
    interpreted by git as a flag and the command runs via sh -c as the Gogs server user.
    A public Metasploit module exists (multi/http/gogs_rebase_rce). Only authenticated users
    need be an attacker; on instances with open registration that means any user.
    The 0-FP discriminator is the parent process: the exploit launches git rebase from the Gogs
    server process, whereas a legitimate git rebase --exec from a developer shell or CI runner
    has a non-gogs parent and does not match.
references:
    - https://www.rapid7.com/blog/post/ve-authenticated-rce-via-argument-injection-gogs-unfixed/
    - https://thehackernews.com/2026/05/critical-gogs-rce-vulnerability-lets.html
author: WRG-11
date: 2026-06-01
tags:
    - attack.execution
    - attack.initial-access
    - attack.t1059
    - attack.t1190
logsource:
    category: process_creation
    product: linux
detection:
    selection_git_rebase:
        Image|endswith: '/git'
        CommandLine|contains: 'rebase'
    selection_exec_injection:
        CommandLine|contains:
            - '--exec'
            - ' -x '
    selection_gogs_parent:
        ParentImage|endswith: '/gogs'
    condition: selection_git_rebase and selection_exec_injection and selection_gogs_parent
falsepositives:
    - Very low by design. A legitimate git rebase --exec from a developer shell, IDE, or CI runner
      has a non-gogs parent and will not match. If a deployment intentionally scripts git rebase
      --exec as the gogs service user (uncommon), add a CommandLine allowlist for that specific
      command after field-testing.
level: critical
