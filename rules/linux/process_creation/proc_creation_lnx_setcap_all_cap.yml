title: Linux Suspicious Setcap Use with All Capabilities
id: 6d2d94e7-389c-4cf0-b8a5-45d7573dce4d
status: experimental
description: |
    Detects the use of the 'setcap' utility with parameters that assign all Linux capabilities to a binary file.
    This action can be exploited by adversaries to create a completely backdoored binary, enabling unauthorized access, privilege escalation, or the circumvention of security controls.
references:
    - https://man7.org/linux/man-pages/man8/setcap.8.html
    - https://man7.org/linux/man-pages/man7/cap_text_formats.7.html
    - https://dfir.ch/posts/linux_capabilities/
    - https://juggernaut-sec.com/capabilities/
author: Luc Génaux
date: 2026-02-20
tags:
    - attack.privilege-escalation
    - attack.defense-evasion
    - attack.persistence
    - attack.t1548
    - attack.t1554
logsource:
    product: linux
    category: process_creation
detection:
    selection:
        Image|endswith: '/setcap'
        CommandLine|contains:
            - ' all='
            - ' =e'
            - ' =i'
            - ' =p'
    condition: selection
falsepositives:
    - Unknown
level: medium
