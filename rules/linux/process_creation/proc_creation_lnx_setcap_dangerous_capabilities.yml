title: Linux Dangerous Capability Set via Setcap
id: f3b8a4d2-5c9e-4f64-a2b3-4d1c6e9f8a30
status: experimental
description: |
    Detects use of setcap to assign dangerous Linux capabilities to an executable
    file. Capabilities such as cap_setuid, cap_sys_admin, cap_sys_ptrace,
    cap_sys_module, and cap_net_raw enable privilege escalation without a SUID
    bit, making them harder to detect. Attackers assign these capabilities to
    binaries they control to maintain persistent elevated access or to facilitate
    lateral movement by enabling low-privileged accounts to perform root-level
    operations.
references:
    - https://gtfobins.github.io/#capabilities
    - https://man7.org/linux/man-pages/man8/setcap.8.html
    - https://linux.die.net/man/7/capabilities
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1548.001
logsource:
    category: process_creation
    product: linux
detection:
    selection_img:
        Image|endswith: '/setcap'
    selection_caps:
        CommandLine|contains:
            - 'cap_setuid'
            - 'cap_setgid'
            - 'cap_sys_admin'
            - 'cap_sys_module'
            - 'cap_sys_ptrace'
            - 'cap_sys_rawio'
            - 'cap_dac_override'
            - 'cap_dac_read_search'
            - 'cap_net_raw'
            - 'cap_net_admin'
            - 'cap_bpf'
            - 'cap_setpcap'
            - 'cap_mac_admin'
    filter_legitimate:
        CommandLine|contains: 'cap_net_raw+ep /bin/ping'
    condition: all of selection_* and not filter_legitimate
falsepositives:
    - Package installation scripts that legitimately set capabilities on ping or similar utilities
    - Container runtime configuration setting required capabilities
level: high
