title: Linux Credential Dumping via Unshadow
id: e5b9c3a7-7f4d-4c96-e8a5-6d1b4f9c3e70
status: experimental
description: |
    Detects execution of the unshadow utility, which combines /etc/passwd and
    /etc/shadow to produce a file suitable for offline password cracking with
    tools like John the Ripper or Hashcat. The presence of unshadow on a system
    is unusual outside of authorized security audits and its execution is a
    strong indicator of credential theft activity.
references:
    - https://www.openwall.com/john/doc/
    - https://linux.die.net/man/8/unshadow
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.credential-access
    - attack.t1003.008
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        Image|endswith: '/unshadow'
    condition: selection
falsepositives:
    - Authorized red team or security audit activity
    - Password security assessments by the security team
level: high
