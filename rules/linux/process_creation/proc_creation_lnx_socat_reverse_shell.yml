title: Linux Reverse Shell via Socat or Cryptcat
id: c3f7a1e8-5d2b-4f74-c6e3-4a8b2d7f1c50
status: experimental
description: |
    Detects execution of socat or cryptcat with arguments indicative of a reverse
    shell setup. Socat is a powerful networking utility that can redirect standard
    I/O to a network socket, making it a common tool for establishing reverse shells
    that bypass firewall rules. Cryptcat adds encryption on top, evading plaintext
    content inspection. Unlike netcat, socat is less commonly flagged by default
    endpoint controls.
references:
    - https://gtfobins.github.io/gtfobins/socat/
    - https://www.revshells.com/
    - https://man7.org/linux/man-pages/man1/socat.1.html
author: Ivan Saakov
date: 2026-05-10
tags:
    - attack.execution
    - attack.t1059.004
logsource:
    category: process_creation
    product: linux
detection:
    selection_img:
        Image|endswith:
            - '/socat'
            - '/cryptcat'
    selection_cli:
        CommandLine|contains:
            - 'EXEC:'
            - '/bin/sh'
            - '/bin/bash'
            - '/bin/zsh'
            - 'pty'
    condition: all of selection_*
falsepositives:
    - Legitimate use of socat for authorized port forwarding or debugging
    - Security researchers testing in sandboxed environments
level: high
