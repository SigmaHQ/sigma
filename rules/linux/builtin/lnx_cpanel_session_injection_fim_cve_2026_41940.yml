description: |
    Detects injected privilege tokens written into cPanel session files as a result
    of CVE-2026-41940 exploitation, surfaced by File Integrity Monitoring (FIM) tools
    such as Wazuh, OSSEC, or Auditbeat configured to capture file content change events.
    In CVE-2026-41940, the CRLF injection causes cpsrvd to write attacker-controlled
    key=value pairs directly into session files under /var/cpanel/sessions/:
      hasroot=1       - grants WHM root-level access
      tfa_verified=1  - bypasses two-factor authentication checks
    These strings inside session files are direct exploitation artifacts and should
    never appear in legitimate cPanel session files under normal operating conditions.
    Requires a FIM agent (Wazuh, OSSEC, Auditbeat) configured to monitor
    /var/cpanel/sessions/ with file content capture enabled, forwarding events
    through auditd.
