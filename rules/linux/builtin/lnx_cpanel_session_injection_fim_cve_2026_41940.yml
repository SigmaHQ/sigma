logsource:
    product: linux
    service: auditd
detection:
    keywords:
        - 'hasroot=1'
        - 'tfa_verified=1'
    condition: keywords
falsepositives:
    - Security research environments running PoC tooling against local test instances
    - File integrity monitoring tools scanning session files after patching may still
      surface hasroot=1 if the string was logged before patches sanitized existing sessions
    - Correlate with file path under /var/cpanel/sessions/ in the FIM alert for confidence
level: high
