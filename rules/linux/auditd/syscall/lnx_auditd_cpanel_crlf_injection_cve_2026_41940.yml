title: CVE-2026-41940 cPanel CRLF Injection Session File Access via Auditd
id: ccf6f929-8577-4f37-a4ac-25174621771b
related:
    - id: 984a21f0-4d82-4fdc-a2b7-a0e6a1e51c03
