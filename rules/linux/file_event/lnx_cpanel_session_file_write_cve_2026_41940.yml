title: CVE-2026-41940 cPanel Session File Written by Unexpected Process
id: 7aca0427-7e19-4859-af17-40157e2f1f7d
related:
    - id: 984a21f0-4d82-4fdc-a2b7-a0e6a1e51c03
      type: derived
    - id: 77964729-4b1b-49e3-a21d-996d335b85d1
      type: derived
    - id: ccf6f929-8577-4f37-a4ac-25174621771b
      type: derived
status: test
description: |
    Detects suspicious writes to cPanel session files by processes other than the
    legitimate cpsrvd daemon, or session files with malformed names containing
    URL-encoded CRLF characters as a direct artifact of CVE-2026-41940 exploitation.
    In CVE-2026-41940 the CRLF injection causes cpsrvd itself to write attacker-
    controlled key=value pairs (user=root, hasroot=1, tfa_verified=1) into session
    files. The write is performed by the legitimate daemon, so this rule targets:
    1. Writes to /var/cpanel/sessions/ by ANY process other than cpsrvd or cpdavd,
       indicating an attacker directly manipulating session files post-exploitation.
    2. Session filenames containing URL-encoded CR/LF characters (%0d, %0a) — a
       direct artifact of CRLF overflow into the filename field during injection.
    For detection of injected content (hasroot=1, user=root) inside session files,
    pair with the keywords rule (id: ccf6f929-8577-4f37-a4ac-25174621771b) using
    a FIM tool (Wazuh, OSSEC, Auditbeat) configured to capture file content events.
    Requires auditd with session directory monitoring or Sysmon for Linux.
