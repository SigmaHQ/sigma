logsource:
    product: linux
    category: file_event
detection:
    selection_session_path:
        TargetFilename|startswith:
            - '/var/cpanel/sessions/'
            - '/usr/local/cpanel/sessions/'
    filter_legitimate_writers:
        Image|endswith:
            - '/cpsrvd'
            - '/cpsrvd-ssl'
            - '/cpdavd'
            - '/cpdavd-ssl'
    selection_malformed_filename:
        TargetFilename|startswith:
            - '/var/cpanel/sessions/'
            - '/usr/local/cpanel/sessions/'
        TargetFilename|contains:
            - '%0d'
            - '%0a'
            - '%0D'
            - '%0A'
    condition: (selection_session_path and not filter_legitimate_writers) or selection_malformed_filename
falsepositives:
    - cPanel backup or migration tools that copy session directories
    - FIM agents creating temporary index files in monitored directories
    - cPanel development or testing environments with custom session handling
    - Legitimate session filenames may contain hex strings but never URL-encoded CR/LF
level: high
