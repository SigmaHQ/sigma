title: Shell Binary Created by Install Outside Standard Paths
id: e8c3b5f2-4d71-4a92-f853-7e4d9a2c6b18
related:
    - id: f7d2e4b9-3c18-4a67-9e05-1b6f8d3a7c52
      type: similar
status: experimental
description: |
    Detects the 'install' utility writing a shell binary to a location outside standard system binary directories.
    The 'install' command is commonly abused in privilege escalation postinst scripts to drop a SUID-enabled copy of bash (or another shell) into a writable
    path such as /tmp or /home, which the attacker then executes with '-p' to obtain a root shell.
    There is no legitimate reason for 'install' to place a shell binary outside of standard system paths (e.g. /bin, /usr/bin).
references:
    - https://gtfobins.github.io/gtfobins/bash/#suid
    - https://github.com/Vozec/CVE-2026-41651
author: Swachchhanda Shrawan Poudel (Nextron Systems)
date: 2026-04-24
tags:
    - attack.privilege-escalation
    - attack.defense-evasion
    - attack.execution
    - attack.t1036
    - attack.t1548.001
    - attack.t1059.004
logsource:
    category: file_event
    product: linux
detection:
    selection:
        Image|endswith: '/install'
        TargetFilename|endswith:
            - 'bash'
            - '/sh'
            - 'dash'
            - 'zsh'
            - 'ksh'
            - 'mksh'
            - 'csh'
            - 'fish'
    filter_main_standard_paths:
        TargetFilename|startswith:
            - '/bin/'
            - '/usr/bin/'
            - '/sbin/'
            - '/usr/sbin/'
            - '/usr/local/bin/'
            - '/usr/local/sbin/'
    condition: selection and not 1 of filter_main_*
falsepositives:
    - None expected — install writing a shell binary outside standard paths has no legitimate use case
level: high
