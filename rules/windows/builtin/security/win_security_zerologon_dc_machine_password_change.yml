title: Domain Controller Machine Account Password Change by Anonymous - Potential Zerologon
id: bef49b8b-0625-48d4-a7ab-6b043b22cb21
status: experimental
description: |
    Detects a computer account password change (Event 4742, where PasswordLastSet is set) performed by an anonymous or null session.
    Successful exploitation of Zerologon (CVE-2020-1472) resets the target domain controller's machine account password to an empty value over an unauthenticated Netlogon channel. The resulting account change is logged with a SubjectUserName of "ANONYMOUS LOGON" and/or a SubjectUserSid of S-1-0-0, which never occurs for legitimate machine password rotations (those are performed by the machine account itself).
references:
    - https://www.secura.com/blog/zero-logon
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa20-283a
    - https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-10/security/threat-protection/auditing/event-4742
author: EinLamYe
date: 2026-06-29
tags:
    - attack.privilege-escalation
    - attack.credential-access
    - attack.t1068
    - attack.t1003.006
    - cve.2020-1472
logsource:
    product: windows
    service: security
    definition: 'The advanced audit policy setting "Account Management > Computer Account Management" must be configured for Success'
detection:
    selection:
        EventID: 4742
        TargetUserName|endswith: '$'
    selection_anonymous:
        - SubjectUserName: 'ANONYMOUS LOGON'
        - SubjectUserSid: 'S-1-0-0'
    condition: all of selection*
falsepositives:
    - Unknown; anonymous modification of a computer account password is not expected in normal operations
level: critical
