title: Computer Account Created by User Account - Potential MachineAccountQuota Abuse
id: 8efa201d-9190-4c25-9a54-37613b742422
status: experimental
description: |
    Detects the creation of a computer (machine) account (Event 4741) where the creator (SubjectUserName) is a regular user account rather than a domain controller or delegated administrator.
    By default the ms-DS-MachineAccountQuota attribute lets any authenticated user create up to 10 computer accounts. Attackers abuse this to stage follow-on attacks: noPac (CVE-2021-42278/42287) sAMAccountName spoofing, Resource-Based Constrained Delegation (RBCD) takeover, and Shadow Credentials. A computer account being created by a normal user is rarely legitimate outside of controlled provisioning workflows.
references:
    - https://www.crowdstrike.com/blog/how-to-defend-against-samaccountname-spoofing/
    - https://www.thehacker.recipes/ad/movement/domain-settings/machineaccountquota
    - https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-10/security/threat-protection/auditing/event-4741
author: EinLamYe
date: 2026-06-29
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1136.002
logsource:
    product: windows
    service: security
    definition: 'The advanced audit policy setting "Account Management > Computer Account Management" must be configured for Success'
detection:
    selection:
        EventID: 4741
    filter_main_machine_actor:
        SubjectUserName|endswith: '$'
    filter_main_anonymous:
        SubjectUserName: 'ANONYMOUS LOGON'
    condition: selection and not 1 of filter_main_*
falsepositives:
    - Approved provisioning or imaging accounts and helpdesk staff who legitimately domain-join machines; baseline and filter these specific SubjectUserName values
    - SCCM / MDT / Autopilot or other automated deployment service accounts
level: medium
