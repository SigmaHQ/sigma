title: Potential Shellcode Injection via PowerShell Reflection Chain
id: aad0838d-be8c-4fa8-9159-d8be771d2015
related:
    - id: ddcd88cb-7f62-4ce5-86f9-1704190feb0a
      type: similar
status: experimental
description: Detects PowerShell scripts performing reflective shellcode injection using a common pattern of VirtualAlloc, Marshal.Copy, and delegate creation for in-memory execution. This technique bypasses traditional file-based detection by loading and executing shellcode directly in memory.
references:
    - https://github.com/PowerShellMafia/PowerSploit/blob/master/CodeExecution/Invoke-Shellcode.ps1
    - https://thedfirreport.com/2021/08/29/cobalt-strike-a-defenders-guide/
author: AJ Jeffreys
date: 2026-04-24
tags:
    - attack.defense-evasion
    - attack.t1620
logsource:
    product: windows
    category: ps_script
    definition: 'Requirements: Script Block Logging must be enabled'
detection:
    selection_alloc:
        ScriptBlockText|contains:
            - 'VirtualAlloc'
            - 'VirtualAllocEx'
    selection_marshal:
        ScriptBlockText|contains:
            - 'Marshal.Copy'
            - '[System.Runtime.InteropServices.Marshal]::Copy'
    selection_delegate:
        ScriptBlockText|contains|all:
            - 'GetDelegateForFunctionPointer'
            - '].Invoke('
    condition: selection_alloc and selection_marshal and selection_delegate
falsepositives:
    - Authorized red team or penetration testing exercises
    - Security research in isolated lab environments
    - Advanced system administration scripts performing low-level memory operations (rare)
level: high
