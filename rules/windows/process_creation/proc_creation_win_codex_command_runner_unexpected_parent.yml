title: OpenAI Codex Command Runner Spawned By Unexpected Parent Process
id: e9a4b2c3-8d5f-4e6b-ac9d-2f3e4a5b6c7d
status: experimental
description: |
    Detects the OpenAI Codex command runner binary (codex-command-runner-*.exe) being spawned by a process other than codex.exe.
    The legitimate execution chain is strictly: codex.exe -> codex-command-runner-<version>.exe.
    Execution via any other parent process may indicate abuse of the command runner binary for sandbox
    escape, lateral movement, or persistence by an attacker who has obtained access to the Codex installation directory.
references:
    - https://jonny-johnson.medium.com/a-deep-dive-into-codex-windows-sandbox-a2489bf4ae91
    - https://openai.com/index/building-codex-windows-sandbox/
author: Jonathan Johnson, Swachchhanda Shrawan Poudel (Nextron Systems)
date: 2026-05-26
tags:
    - attack.execution
    - attack.stealth
    - attack.t1059
    - attack.t1574
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|contains: '\codex-command-runner-'
    filter_main_expected_parent:
        ParentImage|endswith: '\codex.exe'
    condition: selection and not 1 of filter_main_*
falsepositives:
    - Security tooling or EDR agents that wrap process creation may alter the observed parent
level: medium
