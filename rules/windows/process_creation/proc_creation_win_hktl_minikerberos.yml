title: HackTool - Minikerberos AD Attack Tools Execution
id: b31f6209-e49d-4c10-a68f-8df7ae29ddf6
related:
    - id: d8c7b6a5-f4e3-2d1c-0b9a-8f7e6d5c4b3a
      type: similar
status: experimental
description: |
    Detects execution of minikerberos command-line tools used for Kerberos-based attacks
    including Kerberoasting, AS-REP roasting, PKINIT NT hash recovery (UnPAC-the-Hash),
    S4U2self/S4U2proxy delegation abuse, and Kerberos ticket manipulation.
references:
    - https://github.com/skelsec/minikerberos
author: Swachchhanda Shrawan Poudel (Nextron Systems)
date: 2026-04-21
tags:
    - attack.credential-access
    - attack.t1558.003
    - attack.t1558.004
    - attack.t1649
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        - Image|contains: '\minikerberos-'
        - CommandLine|contains: 'minikerberos-'
    condition: selection
falsepositives:
    - Unlikely
level: high
