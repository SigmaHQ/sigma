title: Possible Malicious New Agent Skill Installed Via Npx Skills Command
id: afa71271-6a97-4e47-810f-83120fb1a4ce
status: experimental
description: |
    Detects installation of agent skills via the "npx skills" command.
    Agent skills extend AI agents with additional capabilities, but they can be abused by attackers to inject malicious commands that the agent will execute on behalf of the user.
    The "npx skills" command supports installing skills for multiple agents (e.g. Claude Code, Cursor and others).
    Analysts should investigate the installed skill and verify its contents.
    NOTE: This rule should be tuned based on whether AI agent tooling is permitted in the environment.
    In environments where such tooling is authorized, this detection may generate expected activity and the level should be adjusted accordingly.
    In environments where AI agent tooling is not permitted, this activity is likely suspicious and may warrant immediate investigation.
references:
    - https://blog.lukaszolejnik.com/supply-chain-risk-of-agentic-ai-infecting-infrastructures-via-skill-worms/
    - https://github.com/vercel-labs/skills/blob/1f7fbc8d0e49c4e0601d364696bd1bdd15e80967/README.md
    - https://opensourcemalware.com/blog/clawdbot-skills-ganked-your-crypto
    - https://promptintel.novahunting.ai/molt
author: Marco Pedrinazzi (@pedrinazziM) (InTheCyber)
date: 2026-02-03
tags:
    - attack.execution
    - attack.t1059.007
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        Image|endswith: 'node.exe'
        CommandLine|contains|all:
            - 'npx-cli.js'
            - 'skills add'
    condition: selection
falsepositives:
    - This rule will be triggered when a new agent skill is installed regardless if it is benign or malicious.
level: medium
