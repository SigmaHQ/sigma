title: HackTool - Certsync Execution
id: 745f66fc-ad78-43a7-807b-58cba1afb7e4
related:
    - id: 7f6e5d4c-3b2a-1f0e-9d8c-7b6a5f4e3d2c
      type: similar
status: experimental
description: |
    Detects execution of certsync, a tool that abuses Active Directory Certificate Services to
    synchronise all domain hashes. It performs a Golden Certificate attack by requesting a
    certificate for every domain user and recovering their NT hashes via UnPAC-the-Hash,
    effectively replicating the impact of DCSync without using the replication RPC interface.
references:
    - https://github.com/zblurx/certsync
author: Swachchhanda Shrawan Poudel (Nextron Systems)
date: 2026-04-21
tags:
    - attack.credential-access
    - attack.t1649
    - attack.t1003.006
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|contains: '\certsync'
    selection_python_img:
        - Image|contains: '\python'
        - OriginalFileName|contains: 'python'
    selection_python_cli:
        CommandLine|contains: 'certsync'
    condition: selection_img or all of selection_python_*
falsepositives:
    - Unlikely
level: high
