author: mahmoudswelam
date: 2026-05-01
tags:
    - attack.initial_access
    - attack.t1190
    - cve.2026.41940
logsource:
    category: webserver
detection:
    # Attacker POSTs to /login/?login_only=1 to seed the session cookie.
    # Normal browser logins do not include the login_only=1 parameter.
    selection_login_trigger:
        cs-method: 'POST'
        cs-uri-stem|contains: '/login/'
        cs-uri-query|contains: 'login_only=1'

    # URL-encoded CRLF sequences in the URI itself.
    # The canonical exploit places CRLF in the Authorization header (not visible
    # in standard logs), but scanner variants and partial encodings surface here.
    selection_crlf_in_uri:
        cs-uri|contains:
            - '%0d%0a'
            - '%0D%0A'
            - '%0d%0A'
            - '%0D%0a'

    # Exclude well-known scanners that probe cPanel endpoints at scale but do not
    # exploit. Tune this list to your environment.
    filter_known_scanners:
        cs-user-agent|contains:
            - 'Shodan'
            - 'censys'
            - 'zgrab'
            - 'masscan'

    condition: (selection_login_trigger or selection_crlf_in_uri) and not filter_known_scanners

falsepositives:
    - Legitimate automated cPanel login scripts using login_only=1 parameter
    - Security scanners performing authorized CVE validation against cPanel instances
    - URL-encoded sequences coincidentally containing 0d0a in unrelated parameters
level: high
