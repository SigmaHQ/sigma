title: CVE-2026-41940 - cPanel CRLF Injection in Login Request
id: 77964729-4b1b-49e3-a21d-996d335b85d1
status: experimental
description: |
    Detects CRLF injection attempts exploiting CVE-2026-41940 in cPanel and WHM.
    The exploit POSTs to /login/?login_only=1 with a crafted Authorization: Basic
    header whose decoded value contains raw CRLF sequences (%0D%0A) followed by
    user=root, injecting arbitrary key=value pairs into the cpsrvd session file
    before sanitization occurs, bypassing authentication entirely.

    Standard Apache/Nginx combined logs do NOT capture request headers — the CRLF
    in the Authorization header is invisible in default access logs. This rule
    targets two observable signals that do appear in standard logs: the specific
    login_only=1 POST pattern (unusual in normal browser flows) and any CRLF
    sequences that surface in the URI itself (seen in scanner variants).

    For header-level detection pair with the keywords rule
    (id: ccf6f929-8577-4f37-a4ac-25174621771b) and the process creation rule
    (id: 984a21f0-4d82-4fdc-a2b7-a0e6a1e51c03).
references:
    - https://support.cpanel.net/hc/en-us/articles/40073787579671
    - https://labs.watchtowr.com/the-internet-is-falling-down-falling-down-falling-down-cpanel-whm-authentication-bypass-cve-2026-41940/
    - https://www.rapid7.com/blog/post/etr-cve-2026-41940-cpanel-whm-authentication-bypass/
    - https://nvd.nist.gov/vuln/detail/CVE-2026-41940
