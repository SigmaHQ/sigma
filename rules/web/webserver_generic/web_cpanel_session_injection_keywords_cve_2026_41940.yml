logsource:
    category: webserver
detection:
    keywords:
        - '%0d%0auser=root'
        - '%0d%0ahasroot=1'
        - '%0d%0atfa_verified=1'

    condition: keywords

falsepositives:
    - Security research environments running PoC tooling against local test instances
    - WAF or proxy logs decoding URL-encoded parameters may create these strings in
      other contexts - correlate with URI path containing /login/ for higher confidence
level: high
