title: Evilginx Microsoft 365 Session Cookie Exfiltration
id: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e
status: experimental
description: |
    Detects potential exfiltration of Microsoft 365 authentication cookies (ESTSAUTH, ESTSAUTHPERSISTENT)
    through proxy logs. Evilginx 3.x phishlets target these cookies to hijack authenticated sessions,
    bypassing MFA including FIDO2/WebAuthn in some configurations.
references:
    - https://github.com/kgretzky/evilginx2
    - https://attack.mitre.org/techniques/T1539/
    - https://www.microsoft.com/en-us/security/blog/2022/07/12/from-cookie-theft-to-bec-attackers-use-aitm-phishing-sites-as-entry-point-to-further-financial-fraud/
author: CyberLeakWatch Investigations
date: 2026-03-12
tags:
    - attack.credential_access
    - attack.t1539
    - attack.initial_access
    - attack.t1566.002
logsource:
    category: proxy
detection:
    selection_cookies:
        cs-cookie|contains:
            - 'ESTSAUTH'
            - 'ESTSAUTHPERSISTENT'
            - 'SDIDC'
            - 'JSHP'
    selection_not_microsoft:
        cs-host|endswith:
            - '.microsoft.com'
            - '.live.com'
            - '.microsoftonline.com'
            - '.msauth.net'
    condition: selection_cookies and not selection_not_microsoft
falsepositives:
    - Legitimate Microsoft SSO federation through third-party identity providers
level: high
