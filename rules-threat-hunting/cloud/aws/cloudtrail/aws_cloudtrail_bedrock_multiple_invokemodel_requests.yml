title: AWS Bedrock InvokeModel or InvokeModelWithResponseStream Request
id: 08954669-70cf-41ed-b807-46d8f48ac395
name: aws_bedrock_invokemodel
status: experimental
description: |
    Detects an InvokeModel or InvokeModelWithResponseStream request to AWS Bedrock.
    This rule serves as the base detection for the correlation rule that identifies high volume abuse patterns such as LLMJacking.
references:
    - https://www.sysdig.com/blog/llmjacking-stolen-cloud-credentials-used-in-new-ai-attack
    - https://permiso.io/blog/exploiting-hosted-models
    - https://docs.aws.amazon.com/bedrock/latest/APIReference/API_runtime_InvokeModelWithResponseStream.html
    - https://docs.aws.amazon.com/bedrock/latest/APIReference/API_runtime_InvokeModel.html
author: Marco Pedrinazzi (@pedrinazziM) (InTheCyber)
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1496.004
    - detection.threat-hunting
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventName:
            - 'InvokeModel'
            - 'InvokeModelWithResponseStream'
        eventSource: 'bedrock.amazonaws.com'
    filter_main_error:
        errorCode|exists: true
    condition: selection and not filter_main_error
falsepositives:
    - >-
        Legitimate applications or services that use Bedrock InvokeModel/InvokeModelWithResponseStream.
        This base rule is intended to be used with the correlation rule for high volume detection.
level: informational
---
title: AWS Bedrock High Volume InvokeModel or Requests
id: 8b2f4d3a-1c5e-4f8a-b9d7-6e3a2c1f0d5b
status: experimental
description: |
    Detects a principal making a high volume of InvokeModel requests to AWS Bedrock within a short timeframe.
    This may indicate LLMJacking, where an attacker uses stolen cloud credentials to abuse hosted AI models at the victim's expense.
    Repeated InvokeModel calls from a principal that does not typically interact with Bedrock services should be investigated.
references:
    - https://www.sysdig.com/blog/llmjacking-stolen-cloud-credentials-used-in-new-ai-attack
    - https://permiso.io/blog/exploiting-hosted-models
author: Marco Pedrinazzi (@pedrinazziM) (InTheCyber)
date: 2026-03-13
tags:
    - attack.impact
    - attack.t1496.004
    - detection.threat-hunting
correlation:
    type: event_count
    rules:
        - aws_bedrock_invokemodel
    group-by:
        - userIdentity.arn
    timespan: 5m
    condition:
        gte: 50
falsepositives:
    - >-
        Legitimate applications or services that use Bedrock InvokeModel/InvokeModelWithResponseStream at high
        frequency (e.g. chatbots, automated pipelines). Tune the thresholds according to your environment.
level: medium
