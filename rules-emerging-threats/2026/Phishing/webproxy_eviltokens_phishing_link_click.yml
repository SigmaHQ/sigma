title: EvilTokens PhaaS Kit Phishing Link Click Via Web Proxy
id: e0e121d0-be4d-4281-af7e-17abbba4a408
status: experimental
description: |
    Detects outbound web proxy requests to URLs matching the EvilTokens
    Phishing-as-a-Service (PhaaS) kit infrastructure, specifically Cloudflare
    Workers and Railway.app domains used in OAuth device code authorization
    phishing attacks. This indicates a user has clicked a phishing link.
references:
    - https://blog.sekoia.io/new-widespread-eviltokens-kit-device-code-phishing-as-a-service-part-1/
author: Lars Ostmann
date: 2026/04/04
tags:
    - attack.initial_access
    - attack.t1566.002
logsource:
    category: proxy
detection:
    selection:
        url|re: '-[a-z0-9]{3}\.[a-z0-9-]{3,}-s-account\.workers\.dev|\.up\.railway\.app'
    filter_blocked:
        action: 'BLOCK'
    condition: selection and not filter_blocked
falsepositives:
    - Legitimate use of Cloudflare Workers or Railway.app domains
level: high